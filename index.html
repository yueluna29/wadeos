
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>WadeOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              wade: {
                accent: ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-accent)' : `rgba(var(--wade-accent-rgb), ${opacityValue})`,
                'accent-hover': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-accent-hover)' : `rgba(var(--wade-accent-hover-rgb), ${opacityValue})`,
                'accent-light': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-accent-light)' : `rgba(var(--wade-accent-light-rgb), ${opacityValue})`,
                border: ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-border)' : `rgba(var(--wade-border-rgb), ${opacityValue})`,
                'bg-base': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-bg-base)' : `rgba(var(--wade-bg-base-rgb), ${opacityValue})`,
                'bg-card': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-bg-card)' : `rgba(var(--wade-bg-card-rgb), ${opacityValue})`,
                'bg-app': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-bg-app)' : `rgba(var(--wade-bg-app-rgb), ${opacityValue})`,
                'text-muted': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-text-muted)' : `rgba(var(--wade-text-muted-rgb), ${opacityValue})`,
                'text-main': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-text-main)' : `rgba(var(--wade-text-main-rgb), ${opacityValue})`,
                'border-light': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-border-light)' : `rgba(var(--wade-border-light-rgb), ${opacityValue})`,
                'code-bg': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-code-bg)' : `rgba(var(--wade-code-bg-rgb), ${opacityValue})`,
                'code-text': ({ opacityValue }) => opacityValue === undefined ? 'var(--wade-code-text)' : `rgba(var(--wade-code-text-rgb), ${opacityValue})`,
                'bubble-luna': 'var(--wade-bubble-luna)',
                'bubble-wade': 'var(--wade-bubble-wade)',
              }
            },
            boxShadow: {
              'wade-glow': 'var(--wade-shadow-glow)'
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: var(--wade-bg-app); /* Soft Pink White */
        color: var(--wade-text-main); /* Dark Brown Text */
        overscroll-behavior: none; /* Prevents pull-to-refresh/bounce on mobile */
        height: 100%;
        width: 100%;
        position: fixed;
        overflow: hidden; /* Lock body scroll */
      }
      /* Remove default tap highlight on mobile */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        height: 100%;
      }
      .font-hand {
        font-family: 'Pacifico', cursive;
      }
      /* Custom Scrollbar for the pink aesthetic */
      @media (min-width: 768px) {
        ::-webkit-scrollbar {
          width: 8px;
          height: 8px;
        }
        ::-webkit-scrollbar-track {
          background: var(--wade-border); 
        }
        ::-webkit-scrollbar-thumb {
          background: var(--wade-accent); 
          border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: var(--wade-accent-hover); 
        }
      }
      @media (max-width: 767px) {
        ::-webkit-scrollbar {
          display: none;
        }
        * {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
      }
      /* Markdown Styles - Tighter for Novel Feel */
      .markdown-content { white-space: pre-wrap; }
      .markdown-content p { margin-bottom: 0.33em; line-height: 1.6; }
      .markdown-content p:last-child { margin-bottom: 0; }
      .markdown-content strong { font-weight: 800; }
      .markdown-content em { font-style: italic; opacity: 0.9; }
      .markdown-content blockquote { border-left: 3px solid var(--wade-accent); padding: 0.2em 0.8em; margin-left: 0; font-style: italic; opacity: 0.8; }

      /* Code Block Styles */
      .markdown-content pre {
        background: linear-gradient(135deg, var(--wade-bg-app) 0%, var(--wade-bg-card) 100%);
        border: 1px solid var(--wade-border);
        border-radius: 12px;
        padding: 12px;
        margin: 0.5em 0;
        overflow: auto;
        max-width: 100%;
        max-height: 400px;
        box-shadow: inset 0 1px 3px rgba(90, 74, 66, 0.05);
      }
      .markdown-content pre code {
        background: transparent;
        padding: 0;
        border: none;
        font-size: 0.85em;
        line-height: 1.4;
        color: var(--wade-text-main);
        font-family: 'Courier New', Courier, monospace;
        display: block;
      }
      .markdown-content code {
        background: var(--wade-bg-app);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
        color: var(--wade-accent);
        font-family: 'Courier New', Courier, monospace;
        border: 1px solid var(--wade-border);
      }

      /* Scrollbar Styles for Code Blocks */
      .markdown-content pre::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .markdown-content pre::-webkit-scrollbar-track {
        background: var(--wade-bg-card);
        border-radius: 10px;
      }
      .markdown-content pre::-webkit-scrollbar-thumb {
        background: var(--wade-accent);
        border-radius: 10px;
      }
      .markdown-content pre::-webkit-scrollbar-thumb:hover {
        background: var(--wade-accent-hover);
      }

      /* Search & Map Animations */
      @keyframes slide-up {
        from {
          transform: translateY(100%);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .animate-slide-up {
        animation: slide-up 0.3s ease-out;
      }

      /* Search Highlight */
      .highlight-search {
        animation: highlight-pulse 1.5s ease-in-out infinite;
      }
      @keyframes highlight-pulse {
        0%, 100% { background-color: transparent; }
        50% { background-color: rgba(var(--wade-accent-rgb), 0.1); }
      }

      /* Message Flash Highlight */
      .highlight-flash {
        animation: flash-highlight 2s ease-out;
      }
      @keyframes flash-highlight {
        0% { background-color: rgba(var(--wade-accent-rgb), 0.3); }
        100% { background-color: transparent; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
    "react-markdown": "https://esm.sh/react-markdown@9",
    "remark-gfm": "https://esm.sh/remark-gfm@4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
