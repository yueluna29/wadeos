
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>WadeOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: #f9f6f7; /* Soft Pink White */
        color: #5a4a42; /* Dark Brown Text */
        overscroll-behavior: none; /* Prevents pull-to-refresh/bounce on mobile */
        height: 100%;
        overflow: hidden; /* Lock body scroll */
      }
      /* Remove default tap highlight on mobile */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        height: 100%;
      }
      .font-hand {
        font-family: 'Pacifico', cursive;
      }
      /* Custom Scrollbar for the pink aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #eae2e8; 
      }
      ::-webkit-scrollbar-thumb {
        background: #d58f99; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #c07a84; 
      }
      /* Markdown Styles - Tighter for Novel Feel */
      .markdown-content { white-space: pre-wrap; }
      .markdown-content p { margin-bottom: 1em; line-height: 1.6; }
      .markdown-content p:last-child { margin-bottom: 0; }
      .markdown-content strong { font-weight: 800; }
      .markdown-content em { font-style: italic; opacity: 0.9; }
      .markdown-content blockquote { border-left: 3px solid #d58f99; padding-left: 1em; margin-left: 0; font-style: italic; opacity: 0.8; }

      /* Search & Map Animations */
      @keyframes slide-up {
        from {
          transform: translateY(100%);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .animate-slide-up {
        animation: slide-up 0.3s ease-out;
      }

      /* Search Highlight */
      .highlight-search {
        animation: highlight-pulse 1.5s ease-in-out infinite;
      }
      @keyframes highlight-pulse {
        0%, 100% { background-color: transparent; }
        50% { background-color: rgba(213, 143, 153, 0.1); }
      }

      /* Message Flash Highlight */
      .highlight-flash {
        animation: flash-highlight 2s ease-out;
      }
      @keyframes flash-highlight {
        0% { background-color: rgba(213, 143, 153, 0.3); }
        100% { background-color: transparent; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
    "react-markdown": "https://esm.sh/react-markdown@9",
    "remark-gfm": "https://esm.sh/remark-gfm@4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
